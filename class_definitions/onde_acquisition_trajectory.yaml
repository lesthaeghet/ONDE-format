onde_class: ONDE_ACQUISITION_TRAJECTORY
inherits: []
description: '### Acquisition trajectory

The acquisition trajectory can be either explicitly described or defined as a series of acquisitions with no spatial locations (which corresponds to a time trigger).
In the former case, the ONDE_ACQUISITION_TRAJECTORY class is subtyped in the ONDE_SPATIAL_TRAJECTORY class, which describes the spatial trajectory of the acquisition frame.
In the latter case, the ONDE_ACQUISITION_TRAJECTORY class is subtyped in the ONDE_TIME_TRAJECTORY class, which describes the temporal trajectory of the acquisition frame.'
fields: {}
