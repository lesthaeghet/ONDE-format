onde_class: ONDE_UT_GATE
inherits:
- ONDE_UT_COMPUTATION
description: ''
fields:
  START:
    full_name: ONDE_UT_GATE:START
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: |-
      For scalar data relying on Ascan data, defines the start time for the
      gate. Mandatory for data related to Ascans.
    dimensions: '1'
  WIDTH:
    full_name: ONDE_UT_GATE:WIDTH
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: |-
      For Cscans scalar data relying on Ascan data, defines the width of the
      gate. Mandatory for data related to Ascans
    dimensions: '1'
  THRESHOLD:
    full_name: ONDE_UT_GATE:THRESHOLD
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: Defines the threshold of the gate for data to be stored
    dimensions: '1'
  DETECTION:
    full_name: ONDE_UT_GATE:DETECTION
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '1'
    allowed_values: '"FIRST_PEAK"|"LAST_PEAK"|"MAX_PEAK"|"FIRST_FLANK"|"LAST_FLANK"|"MAX_FLANK"'
  POLARITY:
    full_name: ONDE_UT_GATE:POLARITY
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '1'
    allowed_values: '"ABSOLUTE"|"POSITIVE"|"NEGATIVE"'
  START_REFERENCE:
    full_name: ONDE_UT_GATE:START_REFERENCE
    required: false
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ<ONDE_UT_GATE>
    description: 'Specifies a gate from which ONDE_UT_GATE:START is measured. If omitted then ONDE_UT_GATE:START is relative to the starting trigger.'
    dimensions: '1'
