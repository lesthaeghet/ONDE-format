# ============================================================
# ONDE Class Definition: ONDE_ULTRASONIC_SETUP
# ============================================================

onde_class: ONDE_ULTRASONIC_SETUP
inherits: []

description: |
  The ultrasonic setup block describes the electronic acquisition parameters
  for a dataset. It defines the digitization settings (sampling rate, gain,
  rectification), filtering, and links to the focal law definitions for
  multi-element setups.

fields:
  ONDE_TYPE:
    full_name: "ONDE:TYPE"
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "[1]"
    allowed_values: '["ONDE_ULTRASONIC_SETUP"]'
    description: "Class type identifier."

  ONDE_LABEL:
    full_name: "ONDE:LABEL"
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "1"
    description: "Human-readable label."

  ONDE_ULTRASONIC_SETUP_RECTIFICATION:
    full_name: "ONDE_ULTRASONIC_SETUP:RECTIFICATION"
    required: true
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: "Signal rectification mode."
    allowed_values:
      FULL_WAVE: "No rectification applied"
      RECTIFIED_POSITIVE: "Positive half-wave rectification"
      RECTIFIED_NEGATIVE: "Negative half-wave rectification"
      RECTIFIED_FULL: "Full-wave rectification"

  ONDE_ULTRASONIC_SETUP_FILTER_TYPE:
    full_name: "ONDE_ULTRASONIC_SETUP:FILTER_TYPE"
    required: false
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: "Type of filtering applied."
    allowed_values:
      NO_FILTER: "No filtering applied"
      LOW_PASS: "Low-pass filter"
      HIGH_PASS: "High-pass filter"
      BAND_PASS: "Band-pass filter"
      OTHER: "Custom filter (see FILTER_PARAMETERS)"

  ONDE_ULTRASONIC_SETUP_FILTER_PARAMETERS:
    full_name: "ONDE_ULTRASONIC_SETUP:FILTER_PARAMETERS"
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "1 or [N_Ascan<m>] or [N_DF<m>,N_Ascan<m>]"
    units: Hz
    description: "Filter frequency parameters."

  ONDE_ULTRASONIC_SETUP_FILTER_DESCRIPTION:
    full_name: "ONDE_ULTRASONIC_SETUP:FILTER_DESCRIPTION"
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "1"
    description: "Description of filtering."

  ONDE_ULTRASONIC_SETUP_ASCAN_SAMPLE_RATE:
    full_name: "ONDE_ULTRASONIC_SETUP:ASCAN_SAMPLE_RATE"
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "1"
    units: Hz
    description: "A-scan sampling frequency."

  ONDE_ULTRASONIC_SETUP_ASCAN_START:
    full_name: "ONDE_ULTRASONIC_SETUP:ASCAN_START"
    required: true
    storage: dataset
    hdf5_type: H5T_FLOAT
    dimensions: "1 or [N_Ascan<m>] or [N_Ascan<m>,N_DF<m>]"
    units: s
    description: "Acquisition start time."

  ONDE_ULTRASONIC_SETUP_SIGNAL:
    full_name: "ONDE_ULTRASONIC_SETUP:SIGNAL"
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    dimensions: "[N_TSig<m>,2]"
    default: "impulse at t=0.0"
    description: "Emission signal digitization."

  ONDE_ULTRASONIC_SETUP_GAIN:
    full_name: "ONDE_ULTRASONIC_SETUP:GAIN"
    required: true
    storage: dataset
    hdf5_type: H5T_FLOAT
    dimensions: "[N_Ascan<m>]"
    description: "Total reception gain per A-scan."

  ONDE_ULTRASONIC_SETUP_PRF:
    full_name: "ONDE_ULTRASONIC_SETUP:PRF"
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    dimensions: "[N_Ascan<m>] or [2]"
    units: Hz
    description: "Pulse Repetition Frequency."

  ONDE_ULTRASONIC_SETUP_TCG_CURVE:
    full_name: "ONDE_ULTRASONIC_SETUP:TCG_CURVE"
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    dimensions: "[N_Ascan<m>,N_TCG<m>]"
    description: "Time-corrected gain curve."

  ONDE_ULTRASONIC_SETUP_PHASED_ARRAY_SETUP:
    full_name: "ONDE_ULTRASONIC_SETUP:PHASED_ARRAY_SETUP"
    required: false
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ
    dimensions: "1"
    description: "Reference to phased array setup."

  ONDE_ULTRASONIC_SETUP_TRANSMIT_LAW:
    full_name: "ONDE_ULTRASONIC_SETUP:TRANSMIT_LAW"
    required: true
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ
    dimensions: "[N_Ascan<m>] or [N_DF<m>,N_Ascan<m>]"
    conditional_requirement: "Mandatory for phased array setups."
    description: "Transmit focal law references."

  ONDE_ULTRASONIC_SETUP_RECEIVE_LAW:
    full_name: "ONDE_ULTRASONIC_SETUP:RECEIVE_LAW"
    required: false
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ
    dimensions: "[N_Ascan<m>] or [N_DF<m>,N_Ascan<m>]"
    description: "Receive focal law references."

notes:
  - title: "Variable gates"
    content: "Variable gates are not handled in this version."

  - title: "TCG and GAIN interaction"
    content: |
      The amplification from TCG must be cumulated with the global gain
      defined by `ONDE_ULTRASONIC_SETUP:GAIN`.
