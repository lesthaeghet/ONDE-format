# ============================================================
# ONDE Class Definition: ONDE_COMPONENT
# ============================================================

onde_class: ONDE_COMPONENT
inherits: []

description: |
  The component block describes the inspected specimen, including its material
  properties, geometry, and positioning within the reference frame. This version
  of the format handles only isotropic materials.

  The MFMC equivalent is the SPECIMEN block (MFMC 2.0.0b).

fields:
  ONDE_TYPE:
    full_name: "ONDE:TYPE"
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: "Class type identifier."

  ONDE_LABEL:
    full_name: "ONDE:LABEL"
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    description: "Human-readable label."

  ONDE_COMPONENT_VELOCITIES:
    full_name: "ONDE_COMPONENT:VELOCITIES"
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[2]"
    units: m/s
    description: "Longitudinal and shear wave velocities."
    detailed_description: |
      The two values indicate the inspected component longitudinal and shear
      wave velocity respectively. If a velocity is unavailable, replace with
      NaN.

      > **Limitation:** Only isotropic materials in this version.

  ONDE_COMPONENT_DENSITY:
    full_name: "ONDE_COMPONENT:DENSITY"
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "1"
    units: "kg/m³"
    description: "Material density."

  ONDE_COMPONENT_VISUALIZATION_CAD:
    full_name: "ONDE_COMPONENT:VISUALIZATION_CAD"
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "1"
    description: "DXF or STL file for component visualization."

  ONDE_COMPONENT_VISUALIZATION_CAD_FRAME:
    full_name: "ONDE_COMPONENT:VISUALIZATION_CAD_FRAME"
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[7]"
    default: identity
    description: "Frame defining visualization CAD position."

  ONDE_COMPONENT_COMPONENT_FRAME:
    full_name: "ONDE_COMPONENT:COMPONENT_FRAME"
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[7]"
    default: identity
    description: "Specimen frame in the reference frame."

  ONDE_COMPONENT_COMMENT:
    full_name: "ONDE_COMPONENT:COMMENT"
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "1"
    description: "Free-form comment."

  ONDE_COMPONENT_IMAGE:
    full_name: "ONDE_COMPONENT:IMAGE"
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[3]"
    description: "Image reference."

notes:
  - title: "Conventions for planar specimens"
    content: |
      In the planar coordinate system, the z direction corresponds to the
      thickness of the inspected specimen.

      ![Planar coordinate convention](../../images/media/figure6.png)

  - title: "Conventions for cylindrical components"
    content: |
      In the cylindrical coordinate system, the x direction corresponds
      to the cylinder axis.

      ![Cylindrical coordinate convention](../../images/media/figure7.png)

# ============================================================
# Subclass: ONDE_PLANE
# ============================================================
---

onde_class: ONDE_PLANE
inherits:
  - ONDE_COMPONENT

description: "A planar component. Inherits all fields from ONDE_COMPONENT."

fields:
  ONDE_TYPE:
    full_name: "ONDE:TYPE"
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "[2]"
    allowed_values: '["ONDE_COMPONENT","ONDE_PLANE"]'
    description: "Type chain including parent."

  ONDE_PLANE_PLATE_DIMENSIONS:
    full_name: "ONDE_PLANE:PLATE_DIMENSIONS"
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[3]"
    units: m
    description: "Length, width, thickness."

# ============================================================
# Subclass: ONDE_CYLINDER
# ============================================================
---

onde_class: ONDE_CYLINDER
inherits:
  - ONDE_COMPONENT

description: "A cylindrical component. Inherits all fields from ONDE_COMPONENT."

fields:
  ONDE_TYPE:
    full_name: "ONDE:TYPE"
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    dimensions: "[2]"
    allowed_values: '["ONDE_COMPONENT","ONDE_CYLINDER"]'
    description: "Type chain including parent."

  ONDE_CYLINDER_DIMENSIONS:
    full_name: "ONDE_CYLINDER:DIMENSIONS"
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    dimensions: "[3]"
    units: m
    description: "Outer diameter, thickness, length."
