onde_class: ROOT
inherits: []
description: '### Version

  The file is identified as a UT ONDE file because of the TYPE datafield which is given at the root of the structure. The
  version of the file points to the version of the present specification.'
fields:
  FILETYPE:
    full_name: ONDE:FILETYPE
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: For detailed information, see https://github.com/COFREND/ONDE-format/blob/main/UT_specification/UT_file_format.md
    dimensions: '1'
    allowed_values: ONDE_UT
  VERSION:
    full_name: ONDE:VERSION
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '1'
    allowed_values: 0.9.0
