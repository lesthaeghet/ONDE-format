onde_class: ONDE_UT_DATASET
inherits: []
description: "# Data structure\n\n## Description of the format\n\n/* TODO : update\
  \ with the modifications introduced with subclassing and accessory classes */ \n\
  \nThe specification of the format is provided in a [dedicated csv file](/ONDE_fields/ONDE_fields.csv)\
  \ organized in the following manner :\n\n- The first column gives the field label\
  \ and its location in the structure. The following convention applies : the name\n\
  \  in bracket points to a group corresponding to a block of the data model. For\
  \ example, {ascan_dataset} indicates an\n  HDF5 group corresponding to an Ascan\
  \ dataset.\n- The second column contains comments explaining the constraints imposed\
  \ on the datafield\n- The third column gives a Mandatory/Optional status\n- The\
  \ fourth column gives the HDF5 implementation : D stands for dataset while A points\
  \ to an information stored as an\n  attribute.\n- The fifth column gives the HDF5\
  \ type\n- The sixth column gives the number of dimensions\n- The seventh column\
  \ provides information on the size or the content of the datafield. For a string\
  \ with a value that is\n  imposed, it will provide this value.\\\n  For other datafields,\
  \ it will be the size of the data. The size is provided in brackets with dimensions\
  \ separated by\n  commas. The dimension of a scalar data will therefore be described\
  \ by [^1]. Dimensions are provided in Fortran\n  convention (column-major order).\n\
  \n## Explanatory notes\n\n### Version\n\nThe file is identified as a UT ONDE file\
  \ because of the TYPE datafield which is given at the root of the structure. The\n\
  version of the file points to the version of the present specification.\n\n### Generic\
  \ remarks on datasets\n\nThe DATE_AND_TIME and OPERATOR fields allow to give indication\
  \ on the context of the acquisition. For DATE_AND_TIME the\nISO 8601 extended format:\
  \ 'yyyy-mm-dd HH:MM:SS' (e.g. '2019-01-16 17:05:06') must be used.\n\n### Notes\
  \ on groups\n\nThe following links provide explanatory notes for the ONDE groups\
  \ that are described in the [cvs reference](/ONDE_fields/ONDE_fields.csv).\n\n[Ascan\
  \ datasets](/UT_specification/ascan_datasets.md)\n\n[Tscan datasets](/UT_specification/tscan_datasets.md)\n\
  \n[Cscan datasets](/UT_specification/ut_cscan_datasets.md)\n\n[Setup](/UT_specification/setup.md)\n\
  \n[Geometric setup](/UT_specification/ut_geometric_setup.md)\n\n[Components](/UT_specification/component.md)\n\
  \n[Probes](/UT_specification/UT_probes.md)\n\n[Trajectory](/UT_specification/trajectory.md)\n\
  \n[Ultrasonic setup](/UT_specification/UT_ultrasonic_setup.md)\n\n[Electronic Law](/UT_specification/UT_law.md)\n\
  \n[Phased array setup](/UT_specification/UT_phased_array_setup.md)\n\n\n[^1]: P.\
  \ Wilcox, MFMC Specification document 2.0.0b.\n[^2]: M. Dennis, ECUF Common Ultrasonic\
  \ Datafile Format, 2018 EPRI Technical Report\n[^3]: S. Holland, Data Models for\
  \ NDE 4.0 and NDE Digital Twin, Chapter for NDE 4.0 textbook\n                 \
  \                               |\n\n# Appendix A -- conversion from quaternions\
  \ to matrices\n\nwhen dealing with 3D orientations, to define the quaternion corresponding\
  \ to the orientation of one reference frame\nrelative to another, we need the following\
  \ formula to calculate the components of a quaternion, q, from the elements of\n\
  a rotation matrix, R:\n\n$q_{1} = \\ \\frac{1}{2}\\sqrt{1 + r_{1,1} + r_{2,2} +\
  \ r_{3,3}}$\n\n$q_{2} = \\ \\frac{1}{2}sign(r_{3,2} - r_{2,3)}$$\\sqrt{1 + r_{1,1}\
  \ - r_{2,2} - r_{3,3}}$\n\n$q_{3} = \\ \\frac{1}{2}sign(r_{1,3} - r_{3,1)}$$\\sqrt{1\
  \ - r_{1,1} + r_{2,2} - r_{3,3}}$\n\n$q_{4} = \\ \\frac{1}{2}sign(r_{2,1} - r_{1,2)}$$\\\
  sqrt{1 - r_{1,1} - r_{2,2} + r_{3,3}}$\n\nWhere\n\n$$R\\ = \\ \\begin{pmatrix}\n\
  r_{1,1} & r_{1,2} & r_{1,3} \\\\\nr_{2,1} & r_{2,2} & r_{2,3} \\\\\nr_{3,1} & r_{3,2}\
  \ & r_{3,3}\n\\end{pmatrix}$$\n\nIf q is the unit quaternion corresponding to the\
  \ rotation matrix R, then -q is the other quaternion corresponding to the\nsame\
  \ orientation.\n\nSimilarly, if you have a unit quaternion q and want to convert\
  \ it to a rotation matrix R, the formula is:\n\n$$R\\ = \\ \\begin{pmatrix}\n2q_{1}^{2}\
  \ + 2q_{2}^{2} - 1 & 2q_{2}q_{3} - 2q_{1}q_{4} & 2q_{2}q_{4} + 2q_{1}q_{3} \\\\\n\
  2q_{2}q_{3} + 2q_{1}q_{4} & 2q_{1}^{2} + 2q_{3}^{2} - 1 & 2q_{3}q_{4} - 2q_{1}q_{2}\
  \ \\\\\n2q_{2}q_{4} - 2q_{1}q_{3} & 2q_{3}q_{4} + 2q_{1}q_{2} & 2q_{1}^{2} + 2q_{4}^{2}\
  \ - 1\n\\end{pmatrix}$$\n\n*Source:[Quaternions and Rotation Sequences: A Primer\
  \ with Applications to Orbits, Aerospace and Virtual Reality](https://amzn.to/2RY2lwI)\n\
  by J. B. Kuipers (Chapter 5, Section 5.14 \"Quaternions to Matrices\", pg. 125)*\n"
