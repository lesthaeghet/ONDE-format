onde_class: ONDE_UT_CSCAN_DATASET
inherits:
- ONDE_UT_DATASET
description: "### CScan datasets and gates\n\n**CScan data and peaks**\n\nWhile this\
  \ Cscan dataset is mostly meant for the storage of peak-like data (amplitude, time\
  \ of flight, etc...) it is\nmore generic and can accommodate different values.\n\
  \nDATA contains a vector of references to datasets containing scalar raw data. The\
  \ size of the data can be either\nN_DF\\<m\\> x N_Ascan\\<m\\> arrays (for data\
  \ resulting from analysis of signals or N_DF\\<m\\> arrays for encoder data or\n\
  data\nresulting from Tscan or monoelement scans.\n\n**Data description**\n\nThe\
  \ DATATYPE field contains a name defining the nature of the data- the name can be\
  \ either custom (MY_MATERIAL_PROPERTY\nfor instance) or a standardized name: THICKNESS,\
  \ TIME_OF_FLIGHT, DEPTH, AMAX.\n\n**Data numbering**\n\nTo be efficient for relatively\
  \ small amounts of data, as opposed to other blocks, the Cscan block allows for\n\
  the handling of several data inside the block. The DATA, DATA_TYPE vectors must\
  \ have the same length and be ordered\ncoherently.\n\n**Data positioning**\n\nThe\
  \ Cscan data can be positioned through a trajectory block which is defined in REFERENCE_TRAJECTORY.\n\
  \n**Underlying raw data**\n\nUNDERLYING_DATA is used to point to the dataset that\
  \ corresponds to the originating raw data. LINKED_DATASET_REFERENCE\ngives the correspondence\
  \ between the scalar data and the originating scan. For a A-Scan, the correspondence\
  \ to the scan\nis expressed in terms of (dataframe, law). For a 2D Tscan, it will\
  \ be (dataframe, column), for a 3D Tscan, it will be (\ndataframe, plane, column).\n\
  \n**Gates**\n\nThe gates are stored as a separate group of type ONDE_UT_GATE. The\
  \ gates are referenced in the ONDE_UT_CSCAN_DATASET group via the \nONDE_UT_CSCAN_DATASET:GATES\
  \ field.\nThe gates used for the acquisition are defined through four parameters.\\\
  \nGATE_START and GATE_WIDTH define the time window and GATE_THRESHOLD defines the\
  \ threshold that was used to trigger the\nstorage of the data. GATE_DETECTION defines\
  \ the type of triggering event that was used to define the gate.\n"
fields:
  TYPE:
    full_name: ONDE:TYPE
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '[2]'
    allowed_values: '["ONDE_UT_DATASET","ONDE_UT_CSCAN_DATASET"]'
  DATA:
    full_name: ONDE_UT_CSCAN_DATASET:DATA
    required: true
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ or HT5_INTEGER
    description: references to arrays containing the different values stored in the
      dataset
    dimensions: '[N_CS<m>] |[N_CS<m>,N_Gate<m>]'
  DATATYPE:
    full_name: ONDE_UT_CSCAN_DATASET:DATATYPE
    required: true
    storage: dataset
    hdf5_type: H5T_STRING
    description: 'string defining the stored data - the name can be either custom  (MY_MATERIAL_PROPERTY
      for instance) or a standardized name : THICKNESS, TIME_OF_FLIGHT, DEPTH, AMAX'
    dimensions: '[N_CS<m>]'
  UNDERLYING_DATA:
    full_name: ONDE_UT_CSCAN_DATASET:UNDERLYING_DATA
    required: false
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ<ONDE_UT_ASCAN_DATASET> or H5T_STD_REF_OBJ<ONDE_UT_TSCAN_DATASET>
    description: reference to the dataset containing the underlying data
    dimensions: '1'
  UNDERLYING_DATA_REFERENCE:
    full_name: ONDE_UT_CSCAN_DATASET:UNDERLYING_DATA_REFERENCE
    required: false
    storage: dataset
    hdf5_type: H5T_INTEGER
    description: Correspondancy between the C-Scan scalar data and the scan originating.
      For a A-Scan, the scan is expressed in terms of (dataframe, law). For a 2D Tscan,
      it will be (dataframe, column), for a 3D Tscan, it will be (dataframe, plane,
      column)
    dimensions: '[N_DF<m>,2] or [N_DF<m>,3]'
  REFERENCE_TRAJECTORY:
    full_name: ONDE_UT_CSCAN_DATASET:REFERENCE_TRAJECTORY
    required: true
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ
    description: ''
    ref_target: ONDE_ACQUISITION_TRAJECTORY
    dimensions: '1'
  GATES:
    full_name: ONDE_UT_CSCAN_DATASET:GATES
    required: false
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ
    description: ''
    ref_target: ONDE_UT_GATE
    dimensions: '[N_Gate<m>]'
