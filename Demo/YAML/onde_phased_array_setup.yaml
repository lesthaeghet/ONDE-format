onde_class: ONDE_PHASED_ARRAY_SETUP
inherits: []
description: "The phased array setup block describes the high-level electronic configuration for Phased Array ultrasonic testing. This optional group has no vocation to be exhaustive in terms of electronic configurations (unlike the law block that permits any description and is fully generic). However, it is intended to cover most of the situations that are common in industrial controls and represent a large share of the acquisition files produced in the industry. In this version of the specification, it encompasses only the most basic setups.\n\nThe specific sequencing (Angle, SScan, EScan, Compound, FMC, PWI) is defined by subclasses of this block. The propagation mode used for the settings is given in SEQUENCE_ANGLE_MODE."
fields:
  TYPE:
    full_name: ONDE:TYPE
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    allowed_values: '["ONDE_PHASED_ARRAY_SETUP"]'
  EMITTER_PROBE:
    full_name: ONDE_PHASED_ARRAY_SETUP:EMITTER_PROBE
    required: true
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ
    description: ''
    dimensions: '1'
  RECEIVING_PROBE:
    full_name: ONDE_PHASED_ARRAY_SETUP:RECEIVING_PROBE
    required: true
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ
    description: ''
    dimensions: '1'
  SEQUENCE_ANGLE_MODE:
    full_name: ONDE_PHASED_ARRAY_SETUP:SEQUENCE_ANGLE_MODE
    required: true
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: ''
    allowed_values: '"L"|"T"'
