onde_class: ONDE_PHASED_ARRAY_ESCAN
inherits:
- ONDE_PHASED_ARRAY_SETUP
description: 'In this configuration consecutive subsets of elements are used in order to form a beam at a specific angle, thus forming a sweeping set of ultrasonic beams. Figure 26 illustrates an Escan for 4 consecutive elements with a step of 3 elements on a 32 element linear transducer.

![EScan configuration](../images/media/figure26.png "Figure 26")'
