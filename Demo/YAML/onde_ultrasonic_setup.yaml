onde_class: ONDE_ULTRASONIC_SETUP
inherits: []
description: "The ultrasonic setup block describes the electronic acquisition parameters for a dataset. It defines the digitization settings (sampling rate, gain, rectification), filtering, and links to the focal law definitions for multi-element setups.\n\n### Combination between offsets and trajectories\nThe offsets and directions provided in the dataset blocks can be combined to the data of the trajectory block in order to share common trajectories between different probes (as is common in TOFD controls for example). In this case, the trajectories links point to the same trajectory objects and the offsets/rotation between the trajectory and the probe PCF describe the relative positions of the different probes with respect to the trajectory frame. A typical example is illustrated in Figure 23, with a trajectory frame given at the Probe Center Separation and offsets used to define the PCF locations. If the offset is not provided, the PCF and trajectory frame are assumed to be the same.\n\n![Example of offset and trajectory combination in the case of a TOFD inspection](../images/media/figure23.png \"Figure 23\")\n"
fields:
  TYPE:
    full_name: ONDE:TYPE
    required: true
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '[1]'
    allowed_values: '["ONDE_ULTRASONIC_SETUP"]'
  LABEL:
    full_name: ONDE:LABEL
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    description: ''
    dimensions: '1'
  RECTIFICATION:
    full_name: ONDE_ULTRASONIC_SETUP:RECTIFICATION
    required: true
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: "Defines if the data are \x91FULL_WAVE\x92 or \x91RECTIFIED_POSITIVE\x92\
      , \x91RECTIFIED_NEGATIVE\x92, \x91RECTIFIED_FULL\x92"
    allowed_values: '"FULL_WAVE","RECTIFIED_POSITIVE","RECTIFIED_NEGATIVE","RECTIFIED_FULL"'
  FILTER_TYPE:
    full_name: ONDE_ULTRASONIC_SETUP:FILTER_TYPE
    required: false
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: "Defines the type of filtering applied to the signals : \x93NO_FILTER\x94\
      , LOW_PASS\x94, \x93HIGH_PASS\x94, \x93BAND_PASS\x94, \x93OTHER\x94"
    allowed_values: '"NO_FILTER","LOW_PASS","HIGH_PASS","BAND_PASS","OTHER"'
  FILTER_PARAMETERS:
    full_name: ONDE_ULTRASONIC_SETUP:FILTER_PARAMETERS
    required: false
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: 'The filtering parameters take different values following the filter type: For HIGH_PASS or LOW_PASS this is a single value giving the -3 dB cut-off frequency. For BAND_PASS this should contain two values for the lower and upper -3 dB cut-off frequencies. For OTHER, this should be an [3,N_DF<m>] matrix where the first row is frequency and the second and third rows provide the real and imaginary parts of the filters transfer function at that frequency.'
    dimensions: 1 or [N_Ascan<m>] or [ N_DF<m>,N_Ascan<m>]
  FILTER_DESCRIPTION:
    full_name: ONDE_ULTRASONIC_SETUP:FILTER_DESCRIPTION
    required: false
    storage: attribute
    hdf5_type: H5T_STRING
    description: Description of the filtering applied
    dimensions: '1'
  ASCAN_SAMPLE_RATE:
    full_name: ONDE_ULTRASONIC_SETUP:ASCAN_SAMPLE_RATE
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: This indicates the sampling frequency of A-scan data points. It is
      assumed that a uniform sampling rate is used throughout A-scan data collection.
    dimensions: '1'
  ASCAN_START:
    full_name: ONDE_ULTRASONIC_SETUP:ASCAN_START
    required: true
    storage: dataset
    hdf5_type: H5T_FLOAT
    description: This indicates the starting time for data acquisition. If dimension
      is 1, the same start time is used for all A-Scans, else a different start time
      is specified for each A-Scan.
    dimensions: 1 or [N_Ascan<m>] or [ N_Ascan<m>,N_DF<m>]
  SIGNAL:
    full_name: ONDE_ULTRASONIC_SETUP:SIGNAL
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    description: Digitization of the emission signal (can be used to store arbitrary  signals).
      If missing impulse emission at time 0.0 is assumed. 2D Array with one row for
      time and one for amplitude.
    dimensions: '[N_TSig<m>,2]'
  GAIN:
    full_name: ONDE_ULTRASONIC_SETUP:GAIN
    required: true
    storage: dataset
    hdf5_type: H5T_FLOAT
    description: 'GAIN indicates the total gain for each A-scan during reception. It is a multiplying factor that was applied at acquisition.'
    dimensions: '[ N_Ascan<m> ]'
  PRF:
    full_name: ONDE_ULTRASONIC_SETUP:PRF
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    description: Pulse Repetition Frequency
    dimensions: '[N_Ascan<m>] or [2]'
  TCG_CURVE:
    full_name: ONDE_ULTRASONIC_SETUP:TCG_CURVE
    required: false
    storage: dataset
    hdf5_type: H5T_FLOAT
    description: 'TCG curve applied to the received signals. It is provided for the entire acquisition gate. The amplitude correction is given for each time sample as a multiplying factor, and must be cumulated to the global one defined by the GAIN attribute.'
    dimensions: '[N_Ascan<m>,N_TCG<m> ]'
  PHASED_ARRAY_SETUP:
    full_name: ONDE_ULTRASONIC_SETUP:PHASED_ARRAY_SETUP
    required: false
    storage: attribute
    hdf5_type: H5T_STD_REF_OBJ
    description: ''
    dimensions: '1'
  TRANSMIT_LAW:
    full_name: ONDE_ULTRASONIC_SETUP:TRANSMIT_LAW
    required: true
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ
    description: "Each A-scan in a dataframe must be associated with both a transmit\
      \ and a receive focal law through the datafields. These contain HDF5 references\
      \ \_to the groups which provide the detailed description of each focal laws\
      \ (the same structure is used for both transmit and receive focal laws). Mandatory\
      \ for phased array setups."
    dimensions: '[N_Ascan<m>] or [N_DF<m>,N_Ascan<m>]'
  RECEIVE_LAW:
    full_name: ONDE_ULTRASONIC_SETUP:RECEIVE_LAW
    required: false
    storage: dataset
    hdf5_type: H5T_STD_REF_OBJ
    description: "Each A-scan in a dataframe must be associated with both a transmit\
      \ and a receive focal law through the datafields. These contain HDF5 references\
      \ \_to the groups which provide the detailed description of each focal laws\
      \ (the same structure is used for both transmit and receive focal laws).Mandatory\
      \ for phased array setups."
    dimensions: '[N_Ascan<m>] or [N_DF<m>,N_Ascan<m>]'
