onde_class: ONDE_PHASED_ARRAY_COMPOUND
inherits:
- ONDE_PHASED_ARRAY_SETUP
description: 'The compound type mixes Escan and Sscan behavior. COMPOUND_INITIAL_ANGLE, COMPOUND_FINAL_ANGLE and COMPOUND_NUMBER_OF_ANGLES give the angle scope, while COMPOUND_NUMBER_OF_ELEMENTS gives the number of elements in the electronic scanning.

![Compound configuration](../images/media/figure27.png "Figure 27")'
