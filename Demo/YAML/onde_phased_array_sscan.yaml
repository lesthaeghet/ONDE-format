  FINISHING_ANGLE:
    full_name: ONDE_PHASED_ARRAY_SSCAN:FINISHING_ANGLE
    required: true
    storage: attribute
    hdf5_type: H5T_FLOAT
    description: ''
    dimensions: '1'
  NUMBER_OF_ANGLES:
    full_name: ONDE_PHASED_ARRAY_SSCAN:NUMBER_OF_ANGLES
    required: true
    storage: attribute
    hdf5_type: H5T_INTEGER
    description: ''
    dimensions: '1'
