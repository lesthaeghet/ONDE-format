onde_class: ONDE_PHASED_ARRAY_SSCAN
inherits:
- ONDE_PHASED_ARRAY_SETUP
description: 'In this configuration, the probe is configured to emit/receive at a set of angles. The angles are linearly varying, therefore the first and last angles and the number of shots define the set of angles.

![SScan configuration](../images/media/figure25.png "Figure 25")'
