site_name: ONDE Format Specification
use_directory_urls: false
theme:
  name: material
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css
nav:
  - Overview: index.md

  - ROOT: root.md

  - ONDE_2DCAD: onde_2dcad.md

  - ONDE_3DCAD: onde_3dcad.md

  - ONDE_ACQUISITION_GRID: onde_acquisition_grid.md

